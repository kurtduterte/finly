include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/generated/**"

linter:
  rules:
    # Relax a few rules for app-level code
    public_member_api_docs: false
    # Riverpod family providers return unexported types; explicit annotation impossible
    specify_nonobvious_property_types: false
